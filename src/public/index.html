<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Profile Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="hero">
      <p class="kicker">GitHub Insight Console</p>
      <h1>Analyze and Track GitHub Profiles</h1>
      <p class="subtitle">Pull live public profile data from GitHub, store it, and revisit analyzed users from your local database.</p>
    </header>

    <section class="panel search-panel">
      <form id="analyzeForm" class="analyze-form">
        <label for="usernameInput">GitHub Username</label>
        <div class="input-row">
          <input id="usernameInput" name="username" type="text" placeholder="e.g. torvalds" required autocomplete="off" />
          <button type="submit">Analyze</button>
        </div>
      </form>
      <p id="statusText" class="status" aria-live="polite"></p>
    </section>

    <section class="grid">
      <article class="panel list-panel">
        <div class="panel-head">
          <h2>Saved Profiles</h2>
          <button id="refreshBtn" class="ghost-btn" type="button">Refresh</button>
        </div>
        <ul id="profilesList" class="profile-list"></ul>
      </article>

      <article class="panel detail-panel">
        <h2>Profile Details</h2>
        <div id="profileDetail" class="profile-detail empty">
          Select or analyze a profile to view details.
        </div>
      </article>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
